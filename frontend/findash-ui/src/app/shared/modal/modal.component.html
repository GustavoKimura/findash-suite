<div
  *ngIf="isOpen"
  class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-75 transition-opacity"
  (click)="closeModal()"
>
  <div
    class="relative bg-gray-800 rounded-lg shadow-xl w-full max-w-lg p-4 sm:p-6 mx-4"
    (click)="$event.stopPropagation()"
  >
    <div
      class="flex items-center justify-between pb-3 border-b border-gray-700"
    >
      <h3 class="text-lg font-semibold text-white">{{ title }}</h3>
      <button
        (click)="closeModal()"
        class="text-gray-400 hover:text-white transition-colors"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-6 w-6"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M6 18L18 6M6 6l12 12"
          />
        </svg>
      </button>
    </div>
    <div class="mt-4">
      <ng-content></ng-content>
    </div>
  </div>
</div>

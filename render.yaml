services:
  - type: web
    name: findash-api
    runtime: docker
    repo: https://github.com/GustavoKimura/findash-suite.git
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/health
    envVars:
      - fromDatabase:
          name: findashdb
          property: host
        key: DB_HOST
      - fromDatabase:
          name: findashdb
          property: database
        key: DB_NAME
      - fromDatabase:
          name: findashdb
          property: user
        key: DB_USER
      - fromDatabase:
          name: findashdb
          property: password
        key: DB_PASSWORD
      - key: JWT_ISSUER
        value: findash-api
      - key: JWT_SECRET
        generateValue: true
    autoDeploy: true

databases:
  - name: findashdb
    databaseName: findashdb
    user: findash_user
    region: oregon
    plan: free
